<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognix AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>🧬 Cognix</h1>
      <p class="sub-title">Powering Conversations with Intelligence.</p>
    </header>

    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="message">
          <div class="avatar">AI</div>
          <div class="message-content">
            👋 Hi, I'm Cognix — your intelligent assistant.
            I'm here to help you with your questions, guide you through tasks, and provide quick, accurate information.
            Just type your query and let's get started 🚀
          </div>
        </div>
      </div>

      <div class="input-container">
        <form class="input-form" id="chatForm">
          <textarea id="userInput" placeholder="Type your message here..." rows="1" required></textarea>

          <button type="submit" id="sendButton">➤</button>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
